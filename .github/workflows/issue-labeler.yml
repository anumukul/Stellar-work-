name: Issue Auto-Labeler

on:
  issues:
    types: [opened, edited]

jobs:
  labeler:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Auto-label based on title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const labelsToAdd = [];

            const rules = [
              { pattern: /\[bug\]|bug:/, label: 'bug' },
              { pattern: /\[feature\]|\[enhancement\]|feature:|enhancement:/, label: 'enhancement' },
              { pattern: /\[contract\]|contract:/, label: 'contract' },
              { pattern: /\[frontend\]|frontend:/, label: 'frontend' },
              { pattern: /\[docs\]|\[documentation\]|docs:|documentation:/, label: 'documentation' },
              { pattern: /\[maintenance\]|maintenance:|chore:/, label: 'maintenance' }
            ];

            for (const rule of rules) {
              if (rule.pattern.test(title)) {
                labelsToAdd.push(rule.label);
              }
            }

            if (labelsToAdd.length > 0) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.payload.issue.number,
                labels: labelsToAdd
              });
            }
